<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0d10;
      --surface: #14161b;
      --surface2: #1c1f27;
      --border: #252830;
      --accent: #4f7fff;
      --accent-glow: rgba(79,127,255,0.18);
      --text: #e8eaf0;
      --muted: #6b7280;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 30% 20%, rgba(79,127,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 36px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text); }

    .icon-wrap {
      width: 52px; height: 52px;
      background: var(--accent-glow);
      border: 1px solid rgba(79,127,255,0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }

    .icon-wrap svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 2; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: #3d4352; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: #3d6bef;
      box-shadow: 0 4px 20px rgba(79,127,255,0.3);
    }

    .btn:active { transform: scale(0.98); }

    .note {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    .note a { color: var(--accent); text-decoration: none; }
    .note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="back-link">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Back to login
    </a>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>

    <h1>Reset password</h1>
    <p class="subtitle">Enter your username and choose a new password to regain access.</p>

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input name="username" placeholder="your_username" required/>
      </div>
      <div class="field">
        <label>New Password</label>
        <input name="password" type="password" placeholder="••••••••" required/>
      </div>
      <button class="btn" type="submit">Update Password</button>
    </form>

    <p class="note">Remember your password? <a href="/">Sign in instead</a></p>
  </div>
</body>
</html>
